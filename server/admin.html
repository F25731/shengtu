<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>云逸生图后台</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, "Microsoft YaHei", system-ui, sans-serif; background:#0b0c10; color:#f4f4f5; }
    body { margin:0; padding:24px; }
    main { max-width:1180px; margin:0 auto; }
    h1 { margin:0 0 18px; font-size:26px; }
    section { background:#15161b; border:1px solid #272a33; border-radius:12px; padding:18px; margin:14px 0; }
    input, button { font:inherit; }
    input { background:#0f1014; color:#fff; border:1px solid #30333d; border-radius:8px; padding:10px 12px; outline:none; }
    input:focus { border-color:#3b82f6; }
    button { border:0; border-radius:8px; padding:10px 14px; background:#2563eb; color:#fff; cursor:pointer; font-weight:600; }
    button.secondary { background:#272a33; }
    button.danger { background:#b91c1c; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }
    label { display:flex; flex-direction:column; gap:6px; color:#a1a1aa; font-size:13px; }
    label span { color:#a1a1aa; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { text-align:left; border-bottom:1px solid #272a33; padding:10px 8px; vertical-align:top; }
    th { color:#a1a1aa; font-weight:600; }
    code { background:#272a33; padding:3px 6px; border-radius:6px; }
    .hidden { display:none; }
    .muted { color:#a1a1aa; }
    .ok { color:#22c55e; }
    .warn { color:#f59e0b; }
    .err { color:#ef4444; }
    textarea { width:100%; min-height:120px; background:#0f1014; color:#fff; border:1px solid #30333d; border-radius:8px; padding:10px; }
  </style>
</head>
<body>
<main>
  <h1>云逸生图后台</h1>

  <section id="loginPanel">
    <h2>登录</h2>
    <div class="row">
      <input id="password" type="password" placeholder="后台密码" />
      <button onclick="login()">进入后台</button>
    </div>
    <p class="muted">默认密码来自环境变量 <code>YUNYI_ADMIN_PASSWORD</code>。</p>
  </section>

  <div id="adminPanel" class="hidden">
    <section>
      <h2>系统设置</h2>
      <div class="grid">
        <label><span>购买卡密链接</span><input id="purchase_url" placeholder="https://..." /></label>
        <label><span>BackGrace API URL</span><input id="backgrace_api_url" /></label>
        <label><span>BackGrace API Key</span><input id="backgrace_api_key" placeholder="留空不修改" /></label>
        <label><span>模型</span><input id="image_model" /></label>
        <label><span>每次生图消耗次数</span><input id="cost_per_generation" type="number" min="1" /></label>
      </div>
      <p><button onclick="saveSettings()">保存设置</button> <span id="settingsMsg" class="muted"></span></p>
    </section>

    <section>
      <h2>生成卡密</h2>
      <div class="row">
        <input id="batchName" placeholder="批次名，例如 100次卡" />
        <input id="credits" type="number" min="1" value="100" placeholder="每张次数" />
        <input id="count" type="number" min="1" max="5000" value="10" placeholder="生成数量" />
        <button onclick="generateCards()">生成</button>
      </div>
      <textarea id="generatedCodes" placeholder="生成后的卡密会出现在这里，直接复制到你的卡网商品里"></textarea>
    </section>

    <section>
      <div class="row">
        <h2 style="margin-right:auto">卡密列表</h2>
        <input id="cardSearch" placeholder="搜索卡密/批次" />
        <button class="secondary" onclick="loadCards()">刷新</button>
      </div>
      <div style="overflow:auto">
        <table>
          <thead><tr><th>卡密</th><th>批次</th><th>总次数</th><th>已用</th><th>剩余</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
          <tbody id="cardsBody"></tbody>
        </table>
      </div>
    </section>

    <section>
      <div class="row">
        <h2 style="margin-right:auto">使用日志</h2>
        <button class="secondary" onclick="loadLogs()">刷新</button>
      </div>
      <div style="overflow:auto">
        <table>
          <thead><tr><th>时间</th><th>卡密</th><th>消耗</th><th>状态</th><th>提示词/错误</th></tr></thead>
          <tbody id="logsBody"></tbody>
        </table>
      </div>
    </section>
  </div>
</main>

<script>
let token = localStorage.getItem('yunyi_admin_token') || ''

function authHeaders() {
  return token ? { Authorization: `Bearer ${token}` } : {}
}

async function api(path, options = {}) {
  const res = await fetch(path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      ...authHeaders(),
      ...(options.headers || {}),
    },
  })
  const data = await res.json().catch(() => ({}))
  if (!res.ok) throw new Error(data.error || data.message || '请求失败')
  return data
}

async function login() {
  try {
    const data = await api('/api/admin/login', {
      method: 'POST',
      body: JSON.stringify({ password: document.getElementById('password').value }),
    })
    token = data.token
    localStorage.setItem('yunyi_admin_token', token)
    showAdmin()
  } catch (err) {
    alert(err.message)
  }
}

async function showAdmin() {
  document.getElementById('loginPanel').classList.add('hidden')
  document.getElementById('adminPanel').classList.remove('hidden')
  await loadSettings()
  await loadCards()
  await loadLogs()
}

async function loadSettings() {
  const data = await api('/api/admin/settings')
  for (const key of ['purchase_url', 'backgrace_api_url', 'backgrace_api_key', 'image_model', 'cost_per_generation']) {
    document.getElementById(key).value = data[key] || ''
  }
}

async function saveSettings() {
  const payload = {}
  for (const key of ['purchase_url', 'backgrace_api_url', 'backgrace_api_key', 'image_model', 'cost_per_generation']) {
    payload[key] = document.getElementById(key).value
  }
  await api('/api/admin/settings', { method: 'POST', body: JSON.stringify(payload) })
  document.getElementById('settingsMsg').textContent = '已保存'
  setTimeout(() => document.getElementById('settingsMsg').textContent = '', 1800)
}

async function generateCards() {
  const data = await api('/api/admin/cards/generate', {
    method: 'POST',
    body: JSON.stringify({
      batchName: document.getElementById('batchName').value,
      credits: Number(document.getElementById('credits').value),
      count: Number(document.getElementById('count').value),
    }),
  })
  document.getElementById('generatedCodes').value = data.codes.join('\n')
  await loadCards()
}

async function loadCards() {
  const q = encodeURIComponent(document.getElementById('cardSearch')?.value || '')
  const data = await api(`/api/admin/cards?q=${q}`)
  document.getElementById('cardsBody').innerHTML = data.cards.map(card => `
    <tr>
      <td><code>${card.code}</code></td>
      <td>${card.batchName || ''}</td>
      <td>${card.totalCredits}</td>
      <td>${card.usedCredits}</td>
      <td>${card.remainingCredits}</td>
      <td class="${card.status === 'active' ? 'ok' : card.status === 'depleted' ? 'warn' : 'err'}">${card.status}</td>
      <td>${formatTime(card.createdAt)}</td>
      <td><button class="danger" onclick="disableCard('${card.code}')">禁用</button></td>
    </tr>
  `).join('')
}

async function disableCard(code) {
  if (!confirm(`禁用 ${code}？`)) return
  await api(`/api/admin/cards/${encodeURIComponent(code)}/disable`, { method: 'POST', body: '{}' })
  await loadCards()
}

async function loadLogs() {
  const data = await api('/api/admin/logs')
  document.getElementById('logsBody').innerHTML = data.logs.map(log => `
    <tr>
      <td>${formatTime(log.created_at)}</td>
      <td><code>${log.card_code || ''}</code></td>
      <td>${log.cost_credits}</td>
      <td>${log.status}</td>
      <td>${escapeHtml(log.error_message || log.prompt || '')}</td>
    </tr>
  `).join('')
}

function formatTime(value) {
  return value ? new Date(value).toLocaleString('zh-CN') : ''
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;' }[ch]))
}

if (token) showAdmin().catch(() => {
  localStorage.removeItem('yunyi_admin_token')
  token = ''
})
</script>
</body>
</html>
