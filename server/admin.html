<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>云逸生图后台</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, "Microsoft YaHei", system-ui, sans-serif; background:#07080b; color:#f7f7fb; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:#07080b; }
    button, input, select, textarea { font:inherit; }
    button { border:0; border-radius:10px; padding:10px 14px; background:#2f6df6; color:#fff; cursor:pointer; font-weight:700; transition:.16s ease; }
    button:hover { filter:brightness(1.08); }
    button.secondary { background:#23262f; color:#e5e7eb; border:1px solid #333744; }
    button.danger { background:#3a1719; color:#ff7777; border:1px solid #702328; }
    button.ghost { background:transparent; color:#a1a1aa; border:1px solid #2b2f38; }
    button.small { padding:7px 9px; border-radius:8px; font-size:12px; }
    input, select, textarea { width:100%; border:1px solid #2c303a; border-radius:10px; background:#0d0f14; color:#fff; padding:11px 12px; outline:none; }
    input:focus, select:focus, textarea:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.12); }
    textarea { min-height:112px; resize:vertical; }
    main { max-width:1240px; margin:0 auto; padding:28px 22px 48px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:22px; }
    h1 { margin:0; font-size:28px; letter-spacing:.02em; }
    h2 { margin:0 0 16px; font-size:18px; }
    .sub { margin:7px 0 0; color:#8f96a3; font-size:13px; }
    .panel { background:#14161c; border:1px solid #272b35; border-radius:16px; padding:20px; box-shadow:0 18px 60px rgba(0,0,0,.22); }
    .login { max-width:460px; margin:16vh auto 0; }
    .hidden { display:none !important; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .grid { display:grid; gap:14px; }
    .stats { grid-template-columns:repeat(4,minmax(0,1fr)); margin-bottom:16px; }
    .stat { background:#111319; border:1px solid #242833; border-radius:14px; padding:16px; min-height:98px; }
    .stat.clickable { cursor:pointer; }
    .stat-label { color:#8f96a3; font-size:13px; }
    .stat-value { margin-top:10px; font-size:26px; font-weight:800; }
    .stat-note { margin-top:6px; color:#6f7785; font-size:12px; }
    .two-col { grid-template-columns:minmax(280px,.85fr) minmax(460px,1.5fr); align-items:start; }
    label { display:flex; flex-direction:column; gap:7px; color:#a8afbd; font-size:13px; }
    .form-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .toolbar { display:flex; gap:10px; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .filters { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .filters input { width:260px; }
    .filters select { width:130px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { padding:12px 10px; border-bottom:1px solid #252934; text-align:left; vertical-align:middle; }
    th { color:#8f96a3; font-weight:700; white-space:nowrap; }
    code { display:inline-block; border-radius:8px; background:#222631; color:#e5e7eb; padding:4px 7px; }
    .status { display:inline-flex; align-items:center; border-radius:999px; padding:4px 8px; font-size:12px; font-weight:700; }
    .status.active { background:rgba(34,197,94,.13); color:#4ade80; }
    .status.depleted { background:rgba(245,158,11,.14); color:#fbbf24; }
    .status.disabled { background:rgba(239,68,68,.13); color:#f87171; }
    .pager { display:flex; justify-content:flex-end; align-items:center; gap:10px; padding-top:14px; color:#9ca3af; font-size:13px; }
    .modal-backdrop { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; padding:22px; background:rgba(0,0,0,.58); backdrop-filter:blur(10px); }
    .modal { width:min(760px,100%); max-height:88vh; overflow:auto; border:1px solid #303542; border-radius:18px; background:#15171d; box-shadow:0 26px 90px rgba(0,0,0,.45); }
    .modal-head { position:sticky; top:0; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:18px 20px; background:#15171d; border-bottom:1px solid #292d38; }
    .modal-body { padding:20px; }
    .log-item { border:1px solid #292d38; border-radius:12px; padding:14px; margin-bottom:10px; background:#101218; }
    .log-meta { display:flex; gap:10px; flex-wrap:wrap; color:#a1a1aa; font-size:12px; margin-bottom:8px; }
    .log-error { white-space:pre-wrap; color:#fca5a5; font-size:13px; line-height:1.55; }
    .muted { color:#8f96a3; }
    .ok { color:#22c55e; }
    .err { color:#ef4444; }
    @media (max-width:900px) {
      main { padding:20px 14px 40px; }
      .stats, .two-col, .form-grid { grid-template-columns:1fr; }
      .toolbar { align-items:flex-start; flex-direction:column; }
      .filters input, .filters select { width:100%; }
      table { min-width:760px; }
      .table-wrap { overflow:auto; }
    }
  </style>
</head>
<body>
<main>
  <section id="loginPanel" class="panel login">
    <h1>云逸生图后台</h1>
    <p class="sub">请输入后台密码进入管理面板。</p>
    <div class="row" style="margin-top:18px">
      <input id="password" type="password" placeholder="后台密码" style="flex:1;min-width:220px" />
      <button onclick="login()">进入后台</button>
    </div>
  </section>

  <div id="adminPanel" class="hidden">
    <div class="topbar">
      <div>
        <h1>云逸生图后台</h1>
        <p class="sub">卡密、消耗和失败记录集中管理。</p>
      </div>
      <button class="secondary" onclick="openSettingsModal()">系统配置</button>
    </div>

    <div class="grid stats">
      <div class="stat">
        <div class="stat-label">累计生成</div>
        <div id="statTotal" class="stat-value">0</div>
        <div id="statTotal24h" class="stat-note">24小时内 0</div>
      </div>
      <div class="stat">
        <div class="stat-label">成功次数</div>
        <div id="statSuccess" class="stat-value ok">0</div>
        <div id="statSuccess24h" class="stat-note">24小时内 0</div>
      </div>
      <div class="stat clickable" onclick="openFailureModal()">
        <div class="stat-label">失败次数</div>
        <div id="statFailed" class="stat-value err">0</div>
        <div id="statFailed24h" class="stat-note">点击查看失败日志</div>
      </div>
      <div class="stat">
        <div class="stat-label">成功率</div>
        <div id="statRate" class="stat-value">0%</div>
        <div id="statRate24h" class="stat-note">24小时内 0%</div>
      </div>
    </div>

    <div class="grid two-col">
      <section class="panel">
        <h2>生成卡密</h2>
        <div class="grid">
          <label><span>批次名</span><input id="batchName" placeholder="例如 100次卡" /></label>
          <div class="form-grid grid">
            <label><span>每张次数</span><input id="credits" type="number" min="1" value="100" /></label>
            <label><span>生成数量</span><input id="count" type="number" min="1" max="5000" value="10" /></label>
          </div>
          <button onclick="generateCards()">生成卡密</button>
          <label><span>本次生成结果</span><textarea id="generatedCodes" placeholder="生成后的卡密会出现在这里，也会自动进入右侧卡密列表"></textarea></label>
        </div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <h2>卡密列表</h2>
          <div class="filters">
            <input id="cardSearch" placeholder="搜索卡密/批次" onkeydown="if(event.key==='Enter'){cardPage=1;loadCards()}" />
            <select id="cardStatus" onchange="cardPage=1;loadCards()">
              <option value="all">全部</option>
              <option value="available">未用完</option>
              <option value="depleted">已用完</option>
              <option value="disabled">已禁用</option>
            </select>
            <button class="secondary" onclick="cardPage=1;loadCards()">筛选</button>
            <button class="secondary" onclick="copyCurrentPageCards()">复制本页</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>卡密</th><th>批次</th><th>总次数</th><th>已用</th><th>剩余</th><th>状态</th><th>创建时间</th><th>操作</th></tr>
            </thead>
            <tbody id="cardsBody"></tbody>
          </table>
        </div>
        <div class="pager">
          <button class="ghost" onclick="prevCardPage()">上一页</button>
          <span id="cardPageInfo">第 1 页</span>
          <button class="ghost" onclick="nextCardPage()">下一页</button>
        </div>
      </section>
    </div>
  </div>
</main>

<div id="settingsModal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2>系统配置</h2>
      <button class="ghost" onclick="closeSettingsModal()">关闭</button>
    </div>
    <div class="modal-body">
      <div class="form-grid grid">
        <label><span>购买卡密链接</span><input id="purchase_url" placeholder="https://..." /></label>
        <label><span>BackGrace API URL</span><input id="backgrace_api_url" placeholder="https://backgrace.com/v1" /></label>
        <label><span>BackGrace API Key</span><input id="backgrace_api_key" placeholder="留空不修改" /></label>
        <label><span>模型</span><input id="image_model" placeholder="gpt-image-2" /></label>
        <label><span>每张图片消耗次数</span><input id="cost_per_generation" type="number" min="1" /></label>
      </div>
      <div class="row" style="margin-top:18px">
        <button onclick="saveSettings()">保存设置</button>
        <span id="settingsMsg" class="muted"></span>
      </div>
    </div>
  </div>
</div>

<div id="failureModal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2>失败日志</h2>
      <div class="row">
        <button class="secondary" onclick="loadFailures()">刷新</button>
        <button class="ghost" onclick="closeFailureModal()">关闭</button>
      </div>
    </div>
    <div id="failureBody" class="modal-body"></div>
  </div>
</div>

<script>
let token = localStorage.getItem('yunyi_admin_token') || ''
let cardPage = 1
let cardTotal = 0
let currentCards = []
let deletingCardCode = ''
const cardPageSize = 10

function authHeaders() {
  return token ? { Authorization: `Bearer ${token}` } : {}
}

async function api(path, options = {}) {
  const res = await fetch(path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      ...authHeaders(),
      ...(options.headers || {}),
    },
  })
  const data = await res.json().catch(() => ({}))
  if (!res.ok) {
    const message = typeof data.error === 'string' ? data.error : data.error?.message || data.message || '请求失败'
    throw new Error(message)
  }
  return data
}

async function login() {
  try {
    const data = await api('/api/admin/login', {
      method: 'POST',
      body: JSON.stringify({ password: document.getElementById('password').value }),
    })
    token = data.token
    localStorage.setItem('yunyi_admin_token', token)
    showAdmin()
  } catch (err) {
    alert(err.message)
  }
}

async function showAdmin() {
  document.getElementById('loginPanel').classList.add('hidden')
  document.getElementById('adminPanel').classList.remove('hidden')
  await Promise.all([loadSettings(), loadStats(), loadCards()])
}

function openSettingsModal() {
  document.getElementById('settingsModal').classList.remove('hidden')
}

function closeSettingsModal() {
  document.getElementById('settingsModal').classList.add('hidden')
}

async function loadSettings() {
  const data = await api('/api/admin/settings')
  for (const key of ['purchase_url', 'backgrace_api_url', 'backgrace_api_key', 'image_model', 'cost_per_generation']) {
    document.getElementById(key).value = data[key] || ''
  }
}

async function saveSettings() {
  const payload = {}
  for (const key of ['purchase_url', 'backgrace_api_url', 'backgrace_api_key', 'image_model', 'cost_per_generation']) {
    payload[key] = document.getElementById(key).value
  }
  await api('/api/admin/settings', { method: 'POST', body: JSON.stringify(payload) })
  document.getElementById('settingsMsg').textContent = '已保存'
  setTimeout(() => document.getElementById('settingsMsg').textContent = '', 1800)
}

async function loadStats() {
  const data = await api('/api/admin/stats')
  document.getElementById('statTotal').textContent = data.all.total
  document.getElementById('statTotal24h').textContent = `24小时内 ${data.last24h.total}`
  document.getElementById('statSuccess').textContent = data.all.success
  document.getElementById('statSuccess24h').textContent = `24小时内 ${data.last24h.success}`
  document.getElementById('statFailed').textContent = data.all.failed
  document.getElementById('statFailed24h').textContent = `24小时内 ${data.last24h.failed}，点击查看失败日志`
  document.getElementById('statRate').textContent = `${data.all.successRate}%`
  document.getElementById('statRate24h').textContent = `24小时内 ${data.last24h.successRate}%`
}

async function generateCards() {
  const data = await api('/api/admin/cards/generate', {
    method: 'POST',
    body: JSON.stringify({
      batchName: document.getElementById('batchName').value,
      credits: Number(document.getElementById('credits').value),
      count: Number(document.getElementById('count').value),
    }),
  })
  document.getElementById('generatedCodes').value = data.codes.join('\n')
  cardPage = 1
  await loadCards()
}

async function loadCards() {
  const q = encodeURIComponent(document.getElementById('cardSearch')?.value || '')
  const status = encodeURIComponent(document.getElementById('cardStatus')?.value || 'all')
  const data = await api(`/api/admin/cards?q=${q}&status=${status}&page=${cardPage}&pageSize=${cardPageSize}`)
  cardTotal = data.total || 0
  const cards = data.cards || []
  currentCards = cards
  document.getElementById('cardsBody').innerHTML = cards.length ? cards.map(card => `
    <tr>
      <td><code>${escapeHtml(card.code)}</code></td>
      <td>${escapeHtml(card.batchName || '')}</td>
      <td>${card.totalCredits}</td>
      <td>${card.usedCredits}</td>
      <td>${card.remainingCredits}</td>
      <td><span class="status ${card.status}">${statusLabel(card.status)}</span></td>
      <td>${formatTime(card.createdAt)}</td>
      <td>
        <div class="row" style="gap:6px;flex-wrap:nowrap">
          <button class="secondary small" onclick="copyCard('${escapeAttr(card.code)}')">复制</button>
          <button class="danger small" onclick="disableCard('${escapeAttr(card.code)}')">禁用</button>
          <button class="danger small" onclick="deleteCard('${escapeAttr(card.code)}')" ${deletingCardCode === card.code ? 'disabled' : ''}>${deletingCardCode === card.code ? '删除中...' : '删除'}</button>
        </div>
      </td>
    </tr>
  `).join('') : '<tr><td colspan="8" class="muted">暂无卡密</td></tr>'
  const totalPages = Math.max(1, Math.ceil(cardTotal / cardPageSize))
  document.getElementById('cardPageInfo').textContent = `第 ${cardPage} / ${totalPages} 页，共 ${cardTotal} 条`
}

function prevCardPage() {
  if (cardPage <= 1) return
  cardPage -= 1
  loadCards()
}

function nextCardPage() {
  const totalPages = Math.max(1, Math.ceil(cardTotal / cardPageSize))
  if (cardPage >= totalPages) return
  cardPage += 1
  loadCards()
}

async function disableCard(code) {
  if (!confirm(`禁用 ${code}？`)) return
  await api(`/api/admin/cards/${encodeURIComponent(code)}/disable`, { method: 'POST', body: '{}' })
  await loadCards()
}

async function deleteCard(code) {
  deletingCardCode = code
  loadCards()
  flashPageInfo('正在删除卡密...')
  try {
    await api(`/api/admin/cards/${encodeURIComponent(code)}`, { method: 'DELETE' })
    flashPageInfo('卡密已删除')
  } catch (err) {
    alert(err.message || '删除失败')
  } finally {
    deletingCardCode = ''
    await loadCards()
  }
}

async function copyCard(code) {
  await copyText(code)
  flashPageInfo('已复制卡密')
}

async function copyCurrentPageCards() {
  if (!currentCards.length) {
    flashPageInfo('当前页没有可复制的卡密')
    return
  }
  await copyText(currentCards.map(card => card.code).join('\n'))
  flashPageInfo(`已复制本页 ${currentCards.length} 张卡密`)
}

async function copyText(text) {
  if (navigator.clipboard?.writeText) {
    await navigator.clipboard.writeText(text)
    return
  }
  const textarea = document.createElement('textarea')
  textarea.value = text
  textarea.style.position = 'fixed'
  textarea.style.opacity = '0'
  document.body.appendChild(textarea)
  textarea.select()
  document.execCommand('copy')
  textarea.remove()
}

function flashPageInfo(message) {
  const el = document.getElementById('cardPageInfo')
  const previous = el.textContent
  el.textContent = message
  setTimeout(() => {
    el.textContent = previous
  }, 1400)
}

function openFailureModal() {
  document.getElementById('failureModal').classList.remove('hidden')
  loadFailures()
}

function closeFailureModal() {
  document.getElementById('failureModal').classList.add('hidden')
}

async function loadFailures() {
  const data = await api('/api/admin/failures')
  const logs = data.logs || []
  document.getElementById('failureBody').innerHTML = logs.length ? logs.map(log => `
    <div class="log-item">
      <div class="log-meta">
        <span>${formatTime(log.created_at)}</span>
        <span>卡密：<code>${escapeHtml(log.card_code || '')}</code></span>
        <span>消耗：${log.cost_credits}</span>
        <span>状态：${escapeHtml(log.status)}</span>
      </div>
      <div class="muted" style="margin-bottom:8px">提示词：${escapeHtml(log.prompt || '')}</div>
      <div class="log-error">${escapeHtml(log.error_message || '无错误详情')}</div>
    </div>
  `).join('') : '<p class="muted">暂无失败日志</p>'
}

function statusLabel(status) {
  if (status === 'active') return '未用完'
  if (status === 'depleted') return '已用完'
  if (status === 'disabled') return '已禁用'
  return status
}

function formatTime(value) {
  return value ? new Date(value).toLocaleString('zh-CN') : ''
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;' }[ch]))
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#096;')
}

if (token) showAdmin().catch(() => {
  localStorage.removeItem('yunyi_admin_token')
  token = ''
})
</script>
</body>
</html>
