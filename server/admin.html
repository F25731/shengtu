<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>云逸生图后台</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, "Microsoft YaHei", system-ui, sans-serif; background:#07080b; color:#f7f7fb; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:#07080b; }
    button, input, select, textarea { font:inherit; }
    button { border:0; border-radius:10px; padding:10px 14px; background:#2f6df6; color:#fff; cursor:pointer; font-weight:700; transition:.16s ease; }
    button:hover { filter:brightness(1.08); }
    button.secondary { background:#23262f; color:#e5e7eb; border:1px solid #333744; }
    button.danger { background:#3a1719; color:#ff7777; border:1px solid #702328; }
    button.ghost { background:transparent; color:#a1a1aa; border:1px solid #2b2f38; }
    button.small { padding:7px 9px; border-radius:8px; font-size:12px; }
    input, select, textarea { width:100%; border:1px solid #2c303a; border-radius:10px; background:#0d0f14; color:#fff; padding:11px 12px; outline:none; }
    input:focus, select:focus, textarea:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.12); }
    textarea { min-height:112px; resize:vertical; }
    main { max-width:1240px; margin:0 auto; padding:28px 22px 48px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:22px; }
    h1 { margin:0; font-size:28px; letter-spacing:.02em; }
    h2 { margin:0 0 16px; font-size:18px; }
    .sub { margin:7px 0 0; color:#8f96a3; font-size:13px; }
    .panel { background:#14161c; border:1px solid #272b35; border-radius:16px; padding:20px; box-shadow:0 18px 60px rgba(0,0,0,.22); }
    .login { max-width:460px; margin:16vh auto 0; }
    .hidden { display:none !important; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .grid { display:grid; gap:14px; }
    .stats { grid-template-columns:repeat(4,minmax(0,1fr)); margin-bottom:16px; }
    .stat { background:#111319; border:1px solid #242833; border-radius:14px; padding:16px; min-height:98px; }
    .stat.clickable { cursor:pointer; }
    .stat-label { color:#8f96a3; font-size:13px; }
    .stat-value { margin-top:10px; font-size:26px; font-weight:800; }
    .stat-note { margin-top:6px; color:#6f7785; font-size:12px; }
    .two-col { grid-template-columns:minmax(280px,.85fr) minmax(460px,1.5fr); align-items:start; }
    label { display:flex; flex-direction:column; gap:7px; color:#a8afbd; font-size:13px; }
    .form-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .form-grid .wide { grid-column:1 / -1; }
    .settings-stack { display:grid; gap:18px; }
    .settings-section { border:1px solid #292d38; border-radius:14px; padding:16px; background:#101218; }
    .settings-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .settings-tab { background:#20242e; color:#cbd5e1; border:1px solid #303645; }
    .settings-tab.active { background:#2f6df6; color:#fff; border-color:#2f6df6; }
    .settings-page { display:none; }
    .settings-page.active { display:block; }
    .settings-section h3 { margin:0; color:#f4f4f5; font-size:16px; }
    .section-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .route-list { display:grid; gap:12px; margin-top:12px; }
    .route-card { border:1px solid #2b3140; border-radius:12px; padding:14px; background:#151820; }
    .route-card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
    .route-title { display:flex; align-items:center; gap:10px; color:#f4f4f5; font-weight:800; }
    .route-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .route-endpoint { grid-column:1 / -1; }
    .checkline { flex-direction:row; align-items:center; gap:8px; color:#e5e7eb; }
    .checkline input { width:auto; }
    .default-badge { display:inline-flex; align-items:center; border-radius:999px; padding:4px 8px; background:rgba(59,130,246,.16); color:#93c5fd; font-size:12px; }
    .route-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .health-grid { display:grid; gap:12px; }
    .health-card { border:1px solid #2b3140; border-radius:12px; padding:14px; background:#151820; }
    .health-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .health-title { display:flex; align-items:center; gap:8px; font-weight:800; }
    .health-routes { display:grid; gap:8px; }
    .health-route { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:start; padding:10px; border-radius:10px; background:#101218; border:1px solid #242936; }
    .health-route small { display:block; margin-top:4px; color:#81899a; line-height:1.45; word-break:break-all; }
    .status.healthy { background:rgba(34,197,94,.13); color:#4ade80; }
    .status.unhealthy { background:rgba(239,68,68,.13); color:#f87171; }
    .status.probing { background:rgba(59,130,246,.13); color:#60a5fa; }
    .status.unknown { background:rgba(148,163,184,.13); color:#cbd5e1; }
    .status.unconfirmed { background:rgba(245,158,11,.14); color:#fbbf24; }
    .toolbar { display:flex; gap:10px; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .filters { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .filters input { width:260px; }
    .filters select { width:130px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { padding:12px 10px; border-bottom:1px solid #252934; text-align:left; vertical-align:middle; }
    th { color:#8f96a3; font-weight:700; white-space:nowrap; }
    code { display:inline-block; border-radius:8px; background:#222631; color:#e5e7eb; padding:4px 7px; }
    .status { display:inline-flex; align-items:center; border-radius:999px; padding:4px 8px; font-size:12px; font-weight:700; }
    .status.active { background:rgba(34,197,94,.13); color:#4ade80; }
    .status.depleted { background:rgba(245,158,11,.14); color:#fbbf24; }
    .status.disabled { background:rgba(239,68,68,.13); color:#f87171; }
    .pager { display:flex; justify-content:flex-end; align-items:center; gap:10px; padding-top:14px; color:#9ca3af; font-size:13px; }
    .modal-backdrop { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; padding:22px; background:rgba(0,0,0,.58); backdrop-filter:blur(10px); }
    .modal { width:min(760px,100%); max-height:88vh; overflow:auto; border:1px solid #303542; border-radius:18px; background:#15171d; box-shadow:0 26px 90px rgba(0,0,0,.45); }
    .modal-head { position:sticky; top:0; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:18px 20px; background:#15171d; border-bottom:1px solid #292d38; }
    .modal-body { padding:20px; }
    .log-item { border:1px solid #292d38; border-radius:12px; padding:14px; margin-bottom:10px; background:#101218; }
    .log-meta { display:flex; gap:10px; flex-wrap:wrap; color:#a1a1aa; font-size:12px; margin-bottom:8px; }
    .log-error { white-space:pre-wrap; color:#fca5a5; font-size:13px; line-height:1.55; }
    .muted { color:#8f96a3; }
    .ok { color:#22c55e; }
    .err { color:#ef4444; }
    @media (max-width:900px) {
      main { padding:20px 14px 40px; }
      .stats, .two-col, .form-grid { grid-template-columns:1fr; }
      .toolbar { align-items:flex-start; flex-direction:column; }
      .filters input, .filters select { width:100%; }
      table { min-width:760px; }
      .table-wrap { overflow:auto; }
      .route-grid { grid-template-columns:1fr; }
      .route-endpoint { grid-column:auto; }
    }
  </style>
</head>
<body>
<main>
  <section id="loginPanel" class="panel login">
    <h1>云逸生图后台</h1>
    <p class="sub">请输入后台密码进入管理面板。</p>
    <div class="row" style="margin-top:18px">
      <input id="password" type="password" placeholder="后台密码" style="flex:1;min-width:220px" />
      <button onclick="login()">进入后台</button>
    </div>
  </section>

  <div id="adminPanel" class="hidden">
    <div class="topbar">
      <div>
        <h1>云逸生图后台</h1>
        <p class="sub">卡密、消耗和失败记录集中管理。</p>
      </div>
      <button class="secondary" onclick="openSettingsModal()">系统配置</button>
    </div>

    <div class="grid stats">
      <div class="stat">
        <div class="stat-label">累计生成</div>
        <div id="statTotal" class="stat-value">0</div>
        <div id="statTotal24h" class="stat-note">24小时内 0</div>
      </div>
      <div class="stat">
        <div class="stat-label">成功次数</div>
        <div id="statSuccess" class="stat-value ok">0</div>
        <div id="statSuccess24h" class="stat-note">24小时内 0</div>
      </div>
      <div class="stat clickable" onclick="openFailureModal()">
        <div class="stat-label">失败次数</div>
        <div id="statFailed" class="stat-value err">0</div>
        <div id="statFailed24h" class="stat-note">点击查看失败日志</div>
      </div>
      <div class="stat">
        <div class="stat-label">成功率</div>
        <div id="statRate" class="stat-value">0%</div>
        <div id="statRate24h" class="stat-note">24小时内 0%</div>
      </div>
    </div>

    <div class="grid two-col">
      <section class="panel">
        <h2>生成卡密</h2>
        <div class="grid">
          <label><span>批次名</span><input id="batchName" placeholder="例如 100次卡" /></label>
          <div class="form-grid grid">
            <label><span>每张次数</span><input id="credits" type="number" min="1" value="100" /></label>
            <label><span>生成数量</span><input id="count" type="number" min="1" max="5000" value="10" /></label>
          </div>
          <button onclick="generateCards()">生成卡密</button>
          <label><span>本次生成结果</span><textarea id="generatedCodes" placeholder="生成后的卡密会出现在这里，也会自动进入右侧卡密列表"></textarea></label>
        </div>
      </section>

      <section class="panel">
        <div class="toolbar">
          <h2>卡密列表</h2>
          <div class="filters">
            <input id="cardSearch" placeholder="搜索卡密/批次" onkeydown="if(event.key==='Enter'){cardPage=1;loadCards()}" />
            <select id="cardStatus" onchange="cardPage=1;loadCards()">
              <option value="all">全部</option>
              <option value="available">未用完</option>
              <option value="depleted">已用完</option>
              <option value="disabled">已禁用</option>
            </select>
            <button class="secondary" onclick="cardPage=1;loadCards()">筛选</button>
            <button class="secondary" onclick="copyCurrentPageCards()">复制本页</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>卡密</th><th>批次</th><th>总次数</th><th>已用</th><th>剩余</th><th>状态</th><th>创建时间</th><th>操作</th></tr>
            </thead>
            <tbody id="cardsBody"></tbody>
          </table>
        </div>
        <div class="pager">
          <button class="ghost" onclick="prevCardPage()">上一页</button>
          <span id="cardPageInfo">第 1 页</span>
          <button class="ghost" onclick="nextCardPage()">下一页</button>
        </div>
      </section>
    </div>
  </div>
</main>

<div id="settingsModal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2>系统配置</h2>
      <button class="ghost" onclick="closeSettingsModal()">关闭</button>
    </div>
    <div class="modal-body">
      <div class="settings-tabs">
        <button class="settings-tab active" data-settings-tab="basic" onclick="setSettingsTab('basic')">基础配置</button>
        <button class="settings-tab" data-settings-tab="chatgpt" onclick="setSettingsTab('chatgpt')">ChatGPT</button>
        <button class="settings-tab" data-settings-tab="gemini" onclick="setSettingsTab('gemini')">Gemini</button>
        <button class="settings-tab" data-settings-tab="grok" onclick="setSettingsTab('grok')">Grok</button>
        <button class="settings-tab" data-settings-tab="health" onclick="setSettingsTab('health')">状态查询</button>
      </div>
      <div class="settings-stack">
        <section class="settings-section settings-page active" data-settings-page="basic">
          <div class="section-head">
            <h3>基础设置</h3>
          </div>
          <div class="form-grid grid">
            <label><span>购买卡密链接</span><input id="purchase_url" placeholder="https://..." /></label>
            <label><span>每张图片消耗次数</span><input id="cost_per_generation" type="number" min="1" /></label>
            <label><span>最大同时生成任务数</span><input id="max_concurrent_generations" type="number" min="0" placeholder="20，0 表示不限制" /></label>
            <label><span>参考图数量上限</span><input id="max_input_images" type="number" min="1" max="50" placeholder="16" /></label>
            <label><span>单张参考图大小上限 MB</span><input id="max_input_image_mb" type="number" min="1" max="50" step="0.5" placeholder="10" /></label>
            <label class="wide"><span>首页公告</span><textarea id="announcement_text" placeholder="首页公告内容"></textarea></label>
            <label class="wide"><span>入口页说明</span><textarea id="gate_notice_text" placeholder="客户第一次输入卡密前看到的产品介绍"></textarea></label>
            <label class="wide"><span>提示词屏蔽词（一行一个）</span><textarea id="blocked_words" placeholder="例如：习近平&#10;政治人物姓名&#10;不想让用户提交的关键词"></textarea></label>
          </div>
        </section>

        <section class="settings-section settings-page" data-settings-page="chatgpt" data-kind="chatgpt">
          <div class="section-head">
            <h3>ChatGPT 线路</h3>
            <button class="secondary small" onclick="addRoute('chatgpt')">新增线路</button>
          </div>
          <label><span>默认线路</span><select id="chatgpt_default_route" onchange="setDefaultRoute('chatgpt', this.value)"></select></label>
          <div id="chatgpt_routes" class="route-list"></div>
        </section>

        <section class="settings-section settings-page" data-settings-page="gemini" data-kind="gemini">
          <div class="section-head">
            <h3>Gemini 线路</h3>
            <button class="secondary small" onclick="addRoute('gemini')">新增线路</button>
          </div>
          <label><span>默认线路</span><select id="gemini_default_route" onchange="setDefaultRoute('gemini', this.value)"></select></label>
          <div id="gemini_routes" class="route-list"></div>
        </section>

        <section class="settings-section settings-page" data-settings-page="grok" data-kind="grok">
          <div class="section-head">
            <h3>Grok 线路</h3>
            <button class="secondary small" onclick="addRoute('grok')">新增线路</button>
          </div>
          <label><span>默认线路</span><select id="grok_default_route" onchange="setDefaultRoute('grok', this.value)"></select></label>
          <div id="grok_routes" class="route-list"></div>
        </section>

        <section class="settings-section settings-page" data-settings-page="health">
          <div class="section-head">
            <h3>线路状态查询</h3>
            <button class="secondary small" onclick="loadRouteHealth()">刷新状态</button>
          </div>
          <p class="sub" style="margin-bottom:12px">默认线路失败后会自动探测备用线路；默认线路每 15 分钟探测一次，恢复后新任务自动切回默认。</p>
          <div id="routeHealthBody" class="health-grid"></div>
        </section>
      </div>
      <div class="row" style="margin-top:18px">
        <button onclick="saveSettings()">保存设置</button>
        <span id="settingsMsg" class="muted"></span>
      </div>
    </div>
  </div>
</div>

<div id="failureModal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2>失败日志</h2>
      <div class="row">
        <button class="secondary" onclick="loadFailures()">刷新</button>
        <button class="ghost" onclick="closeFailureModal()">关闭</button>
      </div>
    </div>
    <div id="failureBody" class="modal-body"></div>
  </div>
</div>

<script>
let token = localStorage.getItem('yunyi_admin_token') || ''
let cardPage = 1
let cardTotal = 0
let currentCards = []
let deletingCardCode = ''
const cardPageSize = 10
const basicSettingKeys = ['purchase_url', 'cost_per_generation', 'max_concurrent_generations', 'max_input_images', 'max_input_image_mb', 'announcement_text', 'gate_notice_text', 'blocked_words']
const modelKinds = [
  { id: 'chatgpt', label: 'ChatGPT', defaultModel: 'gpt-image-2', defaultMaxImages: 10 },
  { id: 'gemini', label: 'Gemini', defaultModel: 'gemini-3-pro-image-preview', defaultMaxImages: 14 },
  { id: 'grok', label: 'Grok', defaultModel: 'grok-4.2-image', defaultMaxImages: 1 },
]
const protocolOptions = [
  ['openai-images', 'OpenAI Images'],
  ['openai-chat', 'OpenAI Chat'],
  ['gemini-generate-content', 'Gemini generateContent'],
  ['ai6800-media', 'ai6800 Media'],
]
const uploadModeOptions = [
  ['base64', 'base64 上传'],
  ['url', 'URL 上传'],
]
let modelRoutesDraft = createEmptyModelRoutes()

function authHeaders() {
  return token ? { Authorization: `Bearer ${token}` } : {}
}

async function api(path, options = {}) {
  const method = String(options.method || 'GET').toUpperCase()
  const url = method === 'GET' ? withCacheBust(path) : path
  const res = await fetch(url, {
    ...options,
    cache: 'no-store',
    headers: {
      'Content-Type': 'application/json',
      ...authHeaders(),
      ...(options.headers || {}),
    },
  })
  const data = await res.json().catch(() => ({}))
  if (!res.ok) {
    const message = typeof data.error === 'string' ? data.error : data.error?.message || data.message || '请求失败'
    throw new Error(message)
  }
  return data
}

function withCacheBust(path) {
  const separator = path.includes('?') ? '&' : '?'
  return `${path}${separator}_=${Date.now()}`
}

async function login() {
  try {
    const data = await api('/api/admin/login', {
      method: 'POST',
      body: JSON.stringify({ password: document.getElementById('password').value }),
    })
    token = data.token
    localStorage.setItem('yunyi_admin_token', token)
    showAdmin()
  } catch (err) {
    alert(err.message)
  }
}

async function showAdmin() {
  document.getElementById('loginPanel').classList.add('hidden')
  document.getElementById('adminPanel').classList.remove('hidden')
  await Promise.all([loadSettings(), loadStats(), loadCards()])
}

function openSettingsModal() {
  document.getElementById('settingsModal').classList.remove('hidden')
  setSettingsTab('basic')
}

function closeSettingsModal() {
  document.getElementById('settingsModal').classList.add('hidden')
}

function setSettingsTab(tab) {
  document.querySelectorAll('[data-settings-tab]').forEach((button) => {
    button.classList.toggle('active', button.dataset.settingsTab === tab)
  })
  document.querySelectorAll('[data-settings-page]').forEach((page) => {
    page.classList.toggle('active', page.dataset.settingsPage === tab)
  })
  if (tab === 'health') loadRouteHealth()
}

function createEmptyModelRoutes() {
  return Object.fromEntries(modelKinds.map((kind) => [kind.id, { defaultRouteId: '', routes: [] }]))
}

function routeId(kind, index) {
  return `${kind}-${Date.now().toString(36)}-${index + 1}`
}

function normalizeRouteMaxImages(value, fallback) {
  const n = Math.floor(Number(value))
  if (!Number.isFinite(n)) return fallback
  return Math.min(50, Math.max(1, n))
}

function normalizeModelRoutes(input = {}) {
  const output = createEmptyModelRoutes()
  for (const kind of modelKinds) {
    const source = input?.[kind.id] || {}
    const routes = Array.isArray(source.routes) ? source.routes.slice(0, 5) : []
    output[kind.id].routes = routes.map((route, index) => ({
      id: String(route.id || routeId(kind.id, index)),
      enabled: route.enabled !== false,
      name: String(route.name || `线路 ${index + 1}`),
      protocol: protocolOptions.some(([value]) => value === route.protocol) ? route.protocol : (kind.id === 'gemini' ? 'openai-chat' : 'openai-images'),
      endpoint: String(route.endpoint || ''),
      model: String(route.model || kind.defaultModel),
      apiKey: String(route.apiKey || ''),
      uploadMode: uploadModeOptions.some(([value]) => value === route.uploadMode) ? route.uploadMode : 'base64',
      maxImages: normalizeRouteMaxImages(route.maxImages, kind.defaultMaxImages),
    }))
    if (!output[kind.id].routes.length) {
      output[kind.id].routes.push({
        id: routeId(kind.id, 0),
        enabled: true,
        name: '默认线路',
        protocol: kind.id === 'gemini' ? 'openai-chat' : 'openai-images',
        endpoint: '',
        model: kind.defaultModel,
        apiKey: '',
        uploadMode: 'base64',
        maxImages: kind.defaultMaxImages,
      })
    }
    const requestedDefault = String(source.defaultRouteId || '')
    output[kind.id].defaultRouteId = output[kind.id].routes.some((route) => route.id === requestedDefault)
      ? requestedDefault
      : output[kind.id].routes[0].id
  }
  return output
}

function optionHtml(options, selected) {
  return options.map(([value, label]) => `<option value="${escapeHtml(value)}"${value === selected ? ' selected' : ''}>${escapeHtml(label)}</option>`).join('')
}

function renderRouteSections() {
  for (const kind of modelKinds) renderRouteSection(kind.id)
}

function renderRouteSection(kindId) {
  const group = modelRoutesDraft[kindId] || { defaultRouteId: '', routes: [] }
  const select = document.getElementById(`${kindId}_default_route`)
  const list = document.getElementById(`${kindId}_routes`)
  select.innerHTML = group.routes.map((route) => `<option value="${escapeHtml(route.id)}"${route.id === group.defaultRouteId ? ' selected' : ''}>${escapeHtml(route.name || route.id)}</option>`).join('')
  list.innerHTML = group.routes.map((route, index) => renderRouteCard(kindId, route, index, route.id === group.defaultRouteId)).join('')
}

function renderRouteCard(kindId, route, index, isDefault) {
  return `
    <div class="route-card">
      <div class="route-card-head">
        <div class="route-title">
          <label class="checkline"><input type="checkbox" ${route.enabled ? 'checked' : ''} onchange="setRouteField('${kindId}', ${index}, 'enabled', this.checked)" />启用</label>
          <span>${escapeHtml(route.name || `线路 ${index + 1}`)}</span>
          ${isDefault ? '<span class="default-badge">默认</span>' : ''}
        </div>
        <div class="route-actions">
          <button class="ghost small" onclick="moveRoute('${kindId}', ${index}, -1)">上移</button>
          <button class="ghost small" onclick="moveRoute('${kindId}', ${index}, 1)">下移</button>
          <button class="ghost small" onclick="setDefaultRoute('${kindId}', '${escapeHtml(route.id)}')">设为默认</button>
          <button class="danger small" onclick="removeRoute('${kindId}', ${index})">删除</button>
        </div>
      </div>
      <div class="route-grid">
        <label><span>线路名称</span><input value="${escapeHtml(route.name)}" oninput="setRouteField('${kindId}', ${index}, 'name', this.value, false)" /></label>
        <label><span>调用协议</span><select onchange="setRouteField('${kindId}', ${index}, 'protocol', this.value)">${optionHtml(protocolOptions, route.protocol)}</select></label>
        <label class="route-endpoint"><span>调用地址</span><input value="${escapeHtml(route.endpoint)}" placeholder="https://backgrace.com/v1/gpt-image-2" oninput="setRouteField('${kindId}', ${index}, 'endpoint', this.value, false)" /></label>
        <label><span>模型名</span><input value="${escapeHtml(route.model)}" placeholder="gpt-image-2" oninput="setRouteField('${kindId}', ${index}, 'model', this.value, false)" /></label>
        <label><span>API Key</span><input value="${escapeHtml(route.apiKey)}" placeholder="留空不修改" oninput="setRouteField('${kindId}', ${index}, 'apiKey', this.value, false)" /></label>
        <label><span>参考图上传方式</span><select onchange="setRouteField('${kindId}', ${index}, 'uploadMode', this.value)">${optionHtml(uploadModeOptions, route.uploadMode)}</select></label>
        <label><span>参考图上限</span><input type="number" min="1" max="50" value="${escapeHtml(route.maxImages || 1)}" oninput="setRouteField('${kindId}', ${index}, 'maxImages', this.value, false)" /></label>
      </div>
    </div>
  `
}

function setRouteField(kindId, index, field, value, rerender = true) {
  const route = modelRoutesDraft[kindId]?.routes?.[index]
  if (!route) return
  route[field] = value
  if (field === 'name') {
    const select = document.getElementById(`${kindId}_default_route`)
    if (select?.options[index]) select.options[index].textContent = value || route.id
  }
  if (rerender) renderRouteSection(kindId)
}

function addRoute(kindId) {
  const kind = modelKinds.find((item) => item.id === kindId)
  const group = modelRoutesDraft[kindId]
  if (!kind || !group) return
  if (group.routes.length >= 5) {
    alert('每个模型最多配置 5 条线路')
    return
  }
  const index = group.routes.length
  const route = {
    id: routeId(kindId, index),
    enabled: true,
    name: `线路 ${index + 1}`,
    protocol: kindId === 'gemini' ? 'openai-chat' : 'openai-images',
    endpoint: '',
    model: kind.defaultModel,
    apiKey: '',
    uploadMode: 'base64',
    maxImages: kind.defaultMaxImages,
  }
  group.routes.push(route)
  if (!group.defaultRouteId) group.defaultRouteId = route.id
  renderRouteSection(kindId)
}

function removeRoute(kindId, index) {
  const group = modelRoutesDraft[kindId]
  if (!group || group.routes.length <= 1) {
    alert('至少保留 1 条线路')
    return
  }
  const [removed] = group.routes.splice(index, 1)
  if (removed?.id === group.defaultRouteId) group.defaultRouteId = group.routes[0]?.id || ''
  renderRouteSection(kindId)
}

function setDefaultRoute(kindId, routeId) {
  const group = modelRoutesDraft[kindId]
  if (!group) return
  group.defaultRouteId = routeId
  renderRouteSection(kindId)
}

function moveRoute(kindId, index, delta) {
  const group = modelRoutesDraft[kindId]
  if (!group) return
  const nextIndex = index + delta
  if (nextIndex < 0 || nextIndex >= group.routes.length) return
  const [route] = group.routes.splice(index, 1)
  group.routes.splice(nextIndex, 0, route)
  renderRouteSection(kindId)
}

function healthLabel(status) {
  const labels = {
    healthy: '正常',
    unhealthy: '异常',
    probing: '探测中',
    unknown: '未知',
    disabled: '禁用',
  }
  return labels[status] || status || '未知'
}

function formatHealthTime(value) {
  if (!value) return '无'
  const date = new Date(value)
  return Number.isNaN(date.getTime()) ? value : date.toLocaleString()
}

function renderRouteHealth(data) {
  const body = document.getElementById('routeHealthBody')
  const health = data?.health || {}
  body.innerHTML = modelKinds.map((kind) => {
    const group = health[kind.id] || { routes: [] }
    const activeText = group.activeStatus === 'unconfirmed'
      ? '无确认可用渠道'
      : group.defaultDown
        ? '默认异常，使用备用'
        : '默认正常'
    const routes = (group.routes || []).map((route) => `
      <div class="health-route">
        <div>
          <strong>${escapeHtml(route.name || route.id)}</strong>
          <small>${route.isDefault ? '默认线路 · ' : ''}${route.isActive ? '当前使用 · ' : ''}${escapeHtml(route.protocol || '')}</small>
          <small>${escapeHtml(route.endpoint || '')}</small>
          <small>最后成功：${escapeHtml(formatHealthTime(route.lastSuccessAt))}；最后失败：${escapeHtml(formatHealthTime(route.lastFailureAt))}</small>
          ${route.lastError ? `<small class="err">错误：${escapeHtml(route.lastError)}</small>` : ''}
        </div>
        <span class="status ${escapeHtml(route.status || 'unknown')}">${escapeHtml(healthLabel(route.status))}</span>
      </div>
    `).join('')
    return `
      <div class="health-card">
        <div class="health-head">
          <div class="health-title">
            <span>${escapeHtml(kind.label)}</span>
            <span class="status ${group.activeStatus === 'unconfirmed' ? 'unconfirmed' : group.probing ? 'probing' : group.defaultDown ? 'unhealthy' : 'healthy'}">${escapeHtml(activeText)}</span>
          </div>
          <button class="ghost small" onclick="probeRouteKind('${kind.id}')">立即探测</button>
        </div>
        <div class="health-routes">${routes || '<p class="muted">暂无线路</p>'}</div>
      </div>
    `
  }).join('')
}

async function loadRouteHealth() {
  const body = document.getElementById('routeHealthBody')
  if (!body) return
  body.innerHTML = '<p class="muted">正在读取线路状态...</p>'
  try {
    const data = await api('/api/admin/route-health')
    renderRouteHealth(data)
  } catch (err) {
    body.innerHTML = `<p class="err">${escapeHtml(err.message)}</p>`
  }
}

async function probeRouteKind(kindId) {
  await api('/api/admin/route-health', { method: 'POST', body: JSON.stringify({ kind: kindId }) })
  setTimeout(loadRouteHealth, 500)
}

async function loadSettings() {
  const data = await api('/api/admin/settings')
  for (const key of basicSettingKeys) {
    document.getElementById(key).value = data[key] || ''
  }
  modelRoutesDraft = normalizeModelRoutes(data.model_routes)
  renderRouteSections()
}

async function saveSettings() {
  const payload = {}
  for (const key of basicSettingKeys) {
    payload[key] = document.getElementById(key).value
  }
  payload.model_routes = modelRoutesDraft
  await api('/api/admin/settings', { method: 'POST', body: JSON.stringify(payload) })
  document.getElementById('settingsMsg').textContent = '已保存'
  setTimeout(() => document.getElementById('settingsMsg').textContent = '', 1800)
}

async function loadStats() {
  const data = await api('/api/admin/stats')
  document.getElementById('statTotal').textContent = data.all.total
  document.getElementById('statTotal24h').textContent = `24小时内 ${data.last24h.total}`
  document.getElementById('statSuccess').textContent = data.all.success
  document.getElementById('statSuccess24h').textContent = `24小时内 ${data.last24h.success}`
  document.getElementById('statFailed').textContent = data.all.failed
  document.getElementById('statFailed24h').textContent = `24小时内 ${data.last24h.failed}，点击查看失败日志`
  document.getElementById('statRate').textContent = `${data.all.successRate}%`
  document.getElementById('statRate24h').textContent = `24小时内 ${data.last24h.successRate}%`
}

async function generateCards() {
  const data = await api('/api/admin/cards/generate', {
    method: 'POST',
    body: JSON.stringify({
      batchName: document.getElementById('batchName').value,
      credits: Number(document.getElementById('credits').value),
      count: Number(document.getElementById('count').value),
    }),
  })
  document.getElementById('generatedCodes').value = data.codes.join('\n')
  cardPage = 1
  await loadCards()
}

async function loadCards() {
  const q = encodeURIComponent(document.getElementById('cardSearch')?.value || '')
  const status = encodeURIComponent(document.getElementById('cardStatus')?.value || 'all')
  const data = await api(`/api/admin/cards?q=${q}&status=${status}&page=${cardPage}&pageSize=${cardPageSize}`)
  cardTotal = data.total || 0
  const cards = data.cards || []
  currentCards = cards
  document.getElementById('cardsBody').innerHTML = cards.length ? cards.map(card => `
    <tr>
      <td><code>${escapeHtml(card.code)}</code></td>
      <td>${escapeHtml(card.batchName || '')}</td>
      <td>${card.totalCredits}</td>
      <td>${card.usedCredits}</td>
      <td>${card.remainingCredits}</td>
      <td><span class="status ${card.status}">${statusLabel(card.status)}</span></td>
      <td>${formatTime(card.createdAt)}</td>
      <td>
        <div class="row" style="gap:6px;flex-wrap:nowrap">
          <button class="secondary small" onclick="copyCard('${escapeAttr(card.code)}')">复制</button>
          <button class="danger small" onclick="disableCard('${escapeAttr(card.code)}')">禁用</button>
          <button class="danger small" onclick="deleteCard('${escapeAttr(card.code)}')" ${deletingCardCode === card.code ? 'disabled' : ''}>${deletingCardCode === card.code ? '删除中...' : '删除'}</button>
        </div>
      </td>
    </tr>
  `).join('') : '<tr><td colspan="8" class="muted">暂无卡密</td></tr>'
  const totalPages = Math.max(1, Math.ceil(cardTotal / cardPageSize))
  document.getElementById('cardPageInfo').textContent = `第 ${cardPage} / ${totalPages} 页，共 ${cardTotal} 条`
}

function prevCardPage() {
  if (cardPage <= 1) return
  cardPage -= 1
  loadCards()
}

function nextCardPage() {
  const totalPages = Math.max(1, Math.ceil(cardTotal / cardPageSize))
  if (cardPage >= totalPages) return
  cardPage += 1
  loadCards()
}

async function disableCard(code) {
  if (!confirm(`禁用 ${code}？`)) return
  await api(`/api/admin/cards/${encodeURIComponent(code)}/disable`, { method: 'POST', body: '{}' })
  await loadCards()
}

async function deleteCard(code) {
  deletingCardCode = code
  loadCards()
  flashPageInfo('正在删除卡密...')
  try {
    await api(`/api/admin/cards/${encodeURIComponent(code)}`, { method: 'DELETE' })
    flashPageInfo('卡密已删除')
  } catch (err) {
    alert(err.message || '删除失败')
  } finally {
    deletingCardCode = ''
    await loadCards()
  }
}

async function copyCard(code) {
  await copyText(code)
  flashPageInfo('已复制卡密')
}

async function copyCurrentPageCards() {
  if (!currentCards.length) {
    flashPageInfo('当前页没有可复制的卡密')
    return
  }
  await copyText(currentCards.map(card => card.code).join('\n'))
  flashPageInfo(`已复制本页 ${currentCards.length} 张卡密`)
}

async function copyText(text) {
  if (navigator.clipboard?.writeText) {
    await navigator.clipboard.writeText(text)
    return
  }
  const textarea = document.createElement('textarea')
  textarea.value = text
  textarea.style.position = 'fixed'
  textarea.style.opacity = '0'
  document.body.appendChild(textarea)
  textarea.select()
  document.execCommand('copy')
  textarea.remove()
}

function flashPageInfo(message) {
  const el = document.getElementById('cardPageInfo')
  const previous = el.textContent
  el.textContent = message
  setTimeout(() => {
    el.textContent = previous
  }, 1400)
}

function openFailureModal() {
  document.getElementById('failureModal').classList.remove('hidden')
  loadFailures()
}

function closeFailureModal() {
  document.getElementById('failureModal').classList.add('hidden')
}

async function loadFailures() {
  const data = await api('/api/admin/failures')
  const logs = data.logs || []
  document.getElementById('failureBody').innerHTML = logs.length ? logs.map(log => `
    <div class="log-item">
      <div class="log-meta">
        <span>${formatTime(log.created_at)}</span>
        <span>卡密：<code>${escapeHtml(log.card_code || '')}</code></span>
        <span>消耗：${log.cost_credits}</span>
        <span>状态：${escapeHtml(log.status)}</span>
      </div>
      <div class="muted" style="margin-bottom:8px">提示词：${escapeHtml(log.prompt || '')}</div>
      <div class="log-error">${escapeHtml(log.error_message || '无错误详情')}</div>
    </div>
  `).join('') : '<p class="muted">暂无失败日志</p>'
}

function statusLabel(status) {
  if (status === 'active') return '未用完'
  if (status === 'depleted') return '已用完'
  if (status === 'disabled') return '已禁用'
  return status
}

function formatTime(value) {
  return value ? new Date(value).toLocaleString('zh-CN') : ''
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;' }[ch]))
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, '&#096;')
}

if (token) showAdmin().catch(() => {
  localStorage.removeItem('yunyi_admin_token')
  token = ''
})
</script>
